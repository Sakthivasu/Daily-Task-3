
<!DOCTYPE html>
<html>

<head>

    <title>Student Management System</title>

    <link rel="stylesheet"
    href="/static/style.css">

</head>

<body>

    <h1>
        Student Management System
    </h1>

    <div class="new">

    <div class="count-box">
      Total Students:
     <span id="total"></span>
    </div>

    <input type="text"
    id="search"
    placeholder="Search by Name or Course">
    </div>
    <form id="studentForm">

        <input type="text"
        id="name"
        placeholder="Student Name"
        required>

        <input type="email"
        id="email"
        placeholder="Email"
        required>

        <input type="text"
        id="phone"
        placeholder="Phone"
        required>

        <input type="text"
        id="course"
        placeholder="Course"
        required>

        <button type="submit">
            Add Student
        </button>

    </form>

    <table>

        <thead>

            <tr>

                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Course</th>
                <th>Action</th>

            </tr>

        </thead>

        <tbody id="table"></tbody>

    </table>

    <script src="/static/script.js"></script>

</body>
</html>
